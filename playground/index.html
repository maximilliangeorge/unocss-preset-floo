<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>uno-floo playground</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: monospace;
        padding: 2rem;
        max-width: 1440px;
        margin: 0 auto;
        color: #1a1a2e;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      p.sub {
        color: #666;
        margin-top: 0;
      }

      /* Examples */
      #examples {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      #examples button {
        font-family: monospace;
        font-size: 0.85rem;
        padding: 0.4rem 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f5f5f5;
        cursor: pointer;
        transition: all 0.15s;
      }
      #examples button:hover {
        background: #e8e8e8;
        border-color: #999;
      }
      #examples button.active {
        background: #1a1a2e;
        color: #fff;
        border-color: #1a1a2e;
      }

      /* Input */
      textarea {
        width: 100%;
        height: 5rem;
        font-size: 0.95rem;
        font-family: monospace;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        resize: vertical;
      }
      textarea:focus {
        outline: none;
        border-color: #667;
      }

      /* Preview panel */
      .preview-panel {
        margin-top: 1.5rem;
      }
      .preview-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .preview-header h2 {
        margin: 0;
      }
      .viewport-buttons {
        display: flex;
        gap: 0.25rem;
        align-items: center;
      }
      .viewport-buttons button {
        font-family: monospace;
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f5f5f5;
        cursor: pointer;
        transition: all 0.15s;
      }
      .viewport-buttons button:hover {
        background: #e8e8e8;
        border-color: #999;
      }
      .viewport-buttons button.active {
        background: #1a1a2e;
        color: #fff;
        border-color: #1a1a2e;
      }
      .width-label {
        font-size: 0.85rem;
        color: #666;
        margin-left: 0.5rem;
        min-width: 5rem;
      }

      /* Iframe container with resize handle */
      .iframe-wrap {
        position: relative;
        border: 1px solid #ccc;
        border-radius: 6px;
        overflow: hidden;
        background: #fff;
        transition: width 0.25s ease;
      }
      .iframe-wrap.dragging {
        transition: none;
      }
      .iframe-wrap iframe {
        display: block;
        width: 100%;
        height: 200px;
        border: none;
      }
      .resize-handle {
        position: absolute;
        top: 0;
        right: 0;
        width: 8px;
        height: 100%;
        cursor: ew-resize;
        background: transparent;
        transition: background 0.15s;
      }
      .resize-handle:hover,
      .resize-handle.active {
        background: rgba(0, 0, 0, 0.08);
      }
      .resize-handle::after {
        content: '';
        position: absolute;
        top: 50%;
        right: 2px;
        transform: translateY(-50%);
        width: 3px;
        height: 24px;
        border-radius: 2px;
        background: #bbb;
      }

      /* CSS output */
      .css-panel {
        margin-top: 1.5rem;
      }
      .css-panel h2 {
        margin-bottom: 0.5rem;
      }
      pre {
        background: #1e1e2e;
        color: #cdd6f4;
        padding: 1rem;
        white-space: pre-wrap;
        border-radius: 6px;
        font-size: 0.85rem;
        overflow-x: auto;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>uno-floo playground</h1>
    <p class="sub">Responsive scaling expressions for UnoCSS</p>

    <div id="examples"></div>

    <label>
      <strong>Classes</strong>
      <textarea
        id="input"
        placeholder="md:text-size-[~100px]"
      ></textarea>
    </label>

    <div class="preview-panel">
      <div class="preview-header">
        <h2>Preview</h2>
        <div
          class="viewport-buttons"
          id="viewportButtons"
        ></div>
        <span
          class="width-label"
          id="widthLabel"
        ></span>
      </div>
      <div
        class="iframe-wrap"
        id="iframeWrap"
      >
        <iframe id="preview"></iframe>
        <div
          class="resize-handle"
          id="resizeHandle"
        ></div>
      </div>
    </div>

    <div class="css-panel">
      <h2>Generated CSS</h2>
      <pre id="output"></pre>
    </div>

    <script
      type="module"
      src="./main.ts"
    ></script>
  </body>
</html>
